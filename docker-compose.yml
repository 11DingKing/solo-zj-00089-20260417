version: "3"
services:
  mysql:
    image: "mysql:8.0"
    ports:
      - "127.0.0.1:3306:3306"
    expose:
      - 3306
    env_file: ./server/.env
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    networks:
      - nevernote-app
    volumes:
      - mysql-data:/var/lib/mysql
  server:
    build: ./server
    ports:
      - "4000:4000"
    volumes:
      - ./server:/usr/app
      - /usr/app/node_modules
    depends_on:
      - mysql
    networks:
      - nevernote-app
    restart: unless-stopped
    environment:
      MYSQL_HOST_IP: mysql
  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./web:/usr/app
      - /usr/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
volumes:
  mysql-data:
    driver: local
networks:
  nevernote-app:
    driver: bridge
